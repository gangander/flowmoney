<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlowMoney">
  <meta name="theme-color" content="#101214">
  <title>FlowMoney</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #191c1f;
      --panel-2: #22272b;
      --field: #111416;
      --line: #343a40;
      --text: #f6f8fa;
      --muted: #aab3bc;
      --accent: #2dd4bf;
      --yellow: #f7c948;
      --green: #8bdc96;
      --red: #ff8a7a;
      --blue: #8bb9ff;
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100svh;
      margin: 0;
      background:
        radial-gradient(circle at 12% -10%, rgba(45, 212, 191, 0.18), transparent 260px),
        linear-gradient(180deg, #121619, var(--bg) 360px);
      color: var(--text);
      padding: calc(14px + env(safe-area-inset-top)) 12px calc(86px + env(safe-area-inset-bottom));
    }

    main {
      width: min(100%, 560px);
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin: 2px 0 12px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 25px;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .net-card {
      background: linear-gradient(135deg, rgba(45, 212, 191, 0.18), rgba(139, 185, 255, 0.10)), var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
    }

    .net-row {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .net-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .net-value {
      margin-top: 5px;
      font-size: clamp(34px, 11vw, 48px);
      line-height: 1;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .refresh {
      min-width: 48px;
      min-height: 44px;
      border: 1px solid rgba(45, 212, 191, 0.28);
      background: rgba(45, 212, 191, 0.12);
      color: var(--accent);
      border-radius: 7px;
      font-size: 22px;
      font-weight: 900;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .kpi, .panel, .item {
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(25, 28, 31, 0.94);
      border-radius: var(--radius);
    }

    .kpi {
      padding: 10px;
      min-width: 0;
    }

    .kpi span, label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .kpi strong {
      display: block;
      margin-top: 6px;
      font-size: 17px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .progress {
      height: 10px;
      display: flex;
      overflow: hidden;
      border-radius: 999px;
      background: #0f1214;
      margin-top: 14px;
    }

    .progress i {
      display: block;
      min-width: 3px;
    }

    .tabs {
      position: sticky;
      top: env(safe-area-inset-top);
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      padding: 5px;
      margin: 10px 0;
      background: rgba(16, 18, 20, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      backdrop-filter: blur(14px);
    }

    button {
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .tabs button {
      min-height: 42px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }

    .tabs button.active {
      background: var(--panel-2);
      color: var(--text);
    }

    .panel {
      display: none;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
    }

    .panel.active {
      display: block;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .panel h2 {
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      margin: 0 0 6px;
    }

    input, select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--field);
      color: var(--text);
      padding: 12px;
      font: inherit;
      font-size: 16px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
    }

    .full {
      grid-column: 1 / -1;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 10px;
    }

    .primary, .secondary, .danger {
      min-height: 46px;
      border-radius: 7px;
      border: 0;
      padding: 0 14px;
      font-weight: 950;
    }

    .primary {
      background: var(--accent);
      color: #071010;
    }

    .secondary {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .danger {
      min-width: 42px;
      background: rgba(255, 138, 122, 0.12);
      border: 1px solid rgba(255, 138, 122, 0.24);
      color: var(--red);
    }

    .list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 11px;
    }

    .item-main {
      min-width: 0;
    }

    .item-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 950;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .dot {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent);
    }

    .item-value {
      text-align: right;
      font-weight: 950;
      white-space: nowrap;
    }

    .item-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .mini-chart {
      height: 172px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: end;
      gap: 9px;
      padding-top: 8px;
    }

    .bar {
      display: grid;
      align-items: end;
      gap: 7px;
      height: 100%;
    }

    .bar i {
      min-height: 8px;
      border-radius: 7px 7px 3px 3px;
      background: var(--accent);
    }

    .bar span {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      max-width: 536px;
      margin: 0 auto;
      padding: 12px 14px;
      background: #f6f8fa;
      color: #101214;
      border-radius: var(--radius);
      font-weight: 900;
      transform: translateY(110px);
      transition: transform 180ms ease;
      z-index: 4;
    }

    .toast.show {
      transform: translateY(0);
    }

    @media (max-width: 390px) {
      body {
        padding-left: 10px;
        padding-right: 10px;
      }

      .kpis {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>FlowMoney</h1>
        <p class="muted" id="todayLabel"></p>
      </div>
      <p class="muted" id="priceStatus">股價待更新</p>
    </header>

    <section class="net-card">
      <div class="net-row">
        <div>
          <p class="net-label">淨資產</p>
          <p class="net-value" id="netWorth">$0</p>
        </div>
        <button class="refresh" type="button" id="refreshPrices" aria-label="更新股價">↻</button>
      </div>
      <div class="kpis">
        <div class="kpi">
          <span>資產</span>
          <strong id="assetTotal">$0</strong>
        </div>
        <div class="kpi">
          <span>負債</span>
          <strong id="liabilityTotal">$0</strong>
        </div>
        <div class="kpi">
          <span>投資</span>
          <strong id="investmentTotal">$0</strong>
        </div>
      </div>
      <div class="progress" aria-hidden="true">
        <i id="assetBar" style="background: var(--accent)"></i>
        <i id="investmentBar" style="background: var(--yellow)"></i>
        <i id="liabilityBar" style="background: var(--red)"></i>
      </div>
    </section>

    <section class="panel active" id="overviewPanel">
      <div class="panel-head">
        <h2>總覽</h2>
        <span class="muted" id="overviewCount"></span>
      </div>
      <div class="mini-chart">
        <div class="bar"><i id="assetChart"></i><span>資產</span></div>
        <div class="bar"><i id="investmentChart"></i><span>投資</span></div>
        <div class="bar"><i id="liabilityChart"></i><span>負債</span></div>
      </div>
      <div class="list" id="overviewList"></div>
    </section>

    <nav class="tabs" aria-label="功能切換">
      <button class="active" type="button" data-tab="accountsPanel">帳戶</button>
      <button type="button" data-tab="liabilitiesPanel">負債</button>
      <button type="button" data-tab="investmentsPanel">投資</button>
      <button type="button" data-tab="recordsPanel">流水</button>
    </nav>

    <section class="panel active" id="accountsPanel">
      <div class="panel-head">
        <h2>資產帳戶</h2>
        <span class="muted">現金 / 銀行 / 電子錢包</span>
      </div>
      <form id="accountForm" class="grid">
        <div>
          <label for="accountName">名稱</label>
          <input id="accountName" autocomplete="off" placeholder="台新銀行" required>
        </div>
        <div>
          <label for="accountBalance">餘額</label>
          <input id="accountBalance" type="number" inputmode="decimal" step="1" placeholder="0" required>
        </div>
        <div class="full actions">
          <button class="primary" type="submit">新增資產</button>
          <button class="secondary" type="button" data-fill="account">範例</button>
        </div>
      </form>
      <div class="list" id="accountList"></div>
    </section>

    <section class="panel" id="liabilitiesPanel">
      <div class="panel-head">
        <h2>負債</h2>
        <span class="muted">信用卡 / 貸款 / 分期</span>
      </div>
      <form id="liabilityForm" class="grid">
        <div>
          <label for="liabilityName">名稱</label>
          <input id="liabilityName" autocomplete="off" placeholder="信用卡" required>
        </div>
        <div>
          <label for="liabilityBalance">目前欠款</label>
          <input id="liabilityBalance" type="number" inputmode="decimal" step="1" placeholder="0" required>
        </div>
        <div class="full actions">
          <button class="primary" type="submit">新增負債</button>
          <button class="secondary" type="button" data-fill="liability">範例</button>
        </div>
      </form>
      <div class="list" id="liabilityList"></div>
    </section>

    <section class="panel" id="investmentsPanel">
      <div class="panel-head">
        <h2>投資</h2>
        <span class="muted">股票 / ETF / 基金</span>
      </div>
      <form id="investmentForm" class="grid">
        <div>
          <label for="investmentSymbol">代號</label>
          <input id="investmentSymbol" autocomplete="off" autocapitalize="characters" placeholder="2330 或 AAPL" required>
        </div>
        <div>
          <label for="investmentShares">股數</label>
          <input id="investmentShares" type="number" inputmode="decimal" step="0.001" placeholder="0" required>
        </div>
        <div class="full actions">
          <button class="primary" type="submit" id="addInvestmentButton">抓價並新增</button>
          <button class="secondary" type="button" data-fill="investment">範例</button>
        </div>
      </form>
      <div class="list" id="investmentList"></div>
    </section>

    <section class="panel" id="recordsPanel">
      <div class="panel-head">
        <h2>流水</h2>
        <span class="muted">會同步調整帳戶餘額</span>
      </div>
      <form id="recordForm" class="grid">
        <div>
          <label for="recordAccount">帳戶</label>
          <select id="recordAccount" required></select>
        </div>
        <div>
          <label for="recordType">類型</label>
          <select id="recordType">
            <option value="expense">支出</option>
            <option value="income">收入</option>
          </select>
        </div>
        <div>
          <label for="recordName">項目</label>
          <input id="recordName" autocomplete="off" placeholder="餐飲" required>
        </div>
        <div>
          <label for="recordAmount">金額</label>
          <input id="recordAmount" type="number" inputmode="decimal" step="1" placeholder="0" required>
        </div>
        <div class="full actions">
          <button class="primary" type="submit">記一筆</button>
          <button class="secondary" type="button" data-fill="record">範例</button>
        </div>
      </form>
      <div class="list" id="recordList"></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const storeKey = "flowmoney-percento-style-v1";
    const money = new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });
    const number = new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 2 });
    const today = new Date();
    const sampleDate = today.toISOString();
    let state = loadState();
    const netWorth = document.getElementById("netWorth");
    const assetTotal = document.getElementById("assetTotal");
    const liabilityTotal = document.getElementById("liabilityTotal");
    const investmentTotal = document.getElementById("investmentTotal");
    const overviewCount = document.getElementById("overviewCount");
    const assetBar = document.getElementById("assetBar");
    const investmentBar = document.getElementById("investmentBar");
    const liabilityBar = document.getElementById("liabilityBar");
    const assetChart = document.getElementById("assetChart");
    const investmentChart = document.getElementById("investmentChart");
    const liabilityChart = document.getElementById("liabilityChart");
    const overviewList = document.getElementById("overviewList");
    const accountList = document.getElementById("accountList");
    const liabilityList = document.getElementById("liabilityList");
    const investmentList = document.getElementById("investmentList");
    const recordList = document.getElementById("recordList");
    const accountName = document.getElementById("accountName");
    const accountBalance = document.getElementById("accountBalance");
    const liabilityName = document.getElementById("liabilityName");
    const liabilityBalance = document.getElementById("liabilityBalance");
    const investmentSymbol = document.getElementById("investmentSymbol");
    const investmentShares = document.getElementById("investmentShares");
    const addInvestmentButton = document.getElementById("addInvestmentButton");
    const recordAccount = document.getElementById("recordAccount");
    const recordType = document.getElementById("recordType");
    const recordName = document.getElementById("recordName");
    const recordAmount = document.getElementById("recordAmount");
    const priceStatus = document.getElementById("priceStatus");
    const refreshPrices = document.getElementById("refreshPrices");
    const toast = document.getElementById("toast");

    document.getElementById("todayLabel").textContent = new Intl.DateTimeFormat("zh-TW", {
      month: "long",
      day: "numeric",
      weekday: "short"
    }).format(today);

    document.querySelectorAll("[data-tab]").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-tab]").forEach(tab => tab.classList.toggle("active", tab === button));
        document.querySelectorAll("main > .panel:not(#overviewPanel)").forEach(panel => panel.classList.remove("active"));
        document.getElementById(button.dataset.tab).classList.add("active");
      });
    });

    document.querySelectorAll("[data-fill]").forEach(button => {
      button.addEventListener("click", () => fillExample(button.dataset.fill));
    });

    document.getElementById("accountForm").addEventListener("submit", event => {
      event.preventDefault();
      addAccount(accountName.value.trim(), toNumber(accountBalance.value));
      event.target.reset();
    });

    document.getElementById("liabilityForm").addEventListener("submit", event => {
      event.preventDefault();
      addLiability(liabilityName.value.trim(), toNumber(liabilityBalance.value));
      event.target.reset();
    });

    document.getElementById("investmentForm").addEventListener("submit", async event => {
      event.preventDefault();
      const added = await addInvestment(investmentSymbol.value.trim().toUpperCase(), toNumber(investmentShares.value));
      if (added) event.target.reset();
    });

    document.getElementById("recordForm").addEventListener("submit", event => {
      event.preventDefault();
      addRecord(recordAccount.value, recordType.value, recordName.value.trim(), toNumber(recordAmount.value));
      event.target.reset();
    });

    document.getElementById("refreshPrices").addEventListener("click", updatePrices);

    function loadState() {
      const saved = JSON.parse(localStorage.getItem(storeKey) || "null");
      if (saved) return saved;
      return {
        accounts: [
          { id: uid(), name: "銀行", balance: 82000, color: "#2dd4bf" },
          { id: uid(), name: "現金", balance: 3600, color: "#8bb9ff" }
        ],
        liabilities: [
          { id: uid(), name: "信用卡", balance: 12800, color: "#ff8a7a" }
        ],
        investments: [
          { id: uid(), symbol: "2330.TW", shares: 10, price: 950, currency: "TWD", updatedAt: "" }
        ],
        records: [
          { id: uid(), accountId: "", type: "expense", name: "餐飲", amount: 320, createdAt: sampleDate }
        ]
      };
    }

    function save() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function render() {
      const totals = getTotals();
      netWorth.textContent = money.format(totals.net);
      assetTotal.textContent = money.format(totals.assets);
      liabilityTotal.textContent = money.format(totals.liabilities);
      investmentTotal.textContent = money.format(totals.investments);
      overviewCount.textContent = `${state.accounts.length + state.liabilities.length + state.investments.length} 個項目`;
      renderBars(totals);
      renderAccounts();
      renderLiabilities();
      renderInvestments();
      renderRecords();
      renderOverview(totals);
      save();
    }

    function getTotals() {
      const accountAssets = sum(state.accounts, "balance");
      const investments = state.investments.reduce((total, item) => total + item.shares * item.price, 0);
      const liabilities = sum(state.liabilities, "balance");
      return { assets: accountAssets + investments, accountAssets, investments, liabilities, net: accountAssets + investments - liabilities };
    }

    function renderBars(totals) {
      const scale = Math.max(totals.accountAssets, totals.investments, totals.liabilities, 1);
      assetBar.style.width = `${percent(totals.accountAssets, totals.assets + totals.liabilities)}%`;
      investmentBar.style.width = `${percent(totals.investments, totals.assets + totals.liabilities)}%`;
      liabilityBar.style.width = `${percent(totals.liabilities, totals.assets + totals.liabilities)}%`;
      assetChart.style.height = `${Math.max(6, percent(totals.accountAssets, scale))}%`;
      investmentChart.style.height = `${Math.max(6, percent(totals.investments, scale))}%`;
      liabilityChart.style.height = `${Math.max(6, percent(totals.liabilities, scale))}%`;
      assetChart.style.background = "var(--accent)";
      investmentChart.style.background = "var(--yellow)";
      liabilityChart.style.background = "var(--red)";
    }

    function renderOverview(totals) {
      const rows = [
        { title: "可動用資產", value: totals.accountAssets, sub: `${state.accounts.length} 個帳戶`, color: "var(--accent)" },
        { title: "投資市值", value: totals.investments, sub: `${state.investments.length} 檔標的`, color: "var(--yellow)" },
        { title: "總負債", value: totals.liabilities, sub: `${state.liabilities.length} 筆負債`, color: "var(--red)" }
      ];
      overviewList.innerHTML = rows.map(row => itemHtml(row.title, money.format(row.value), row.sub, row.color, "")).join("");
    }

    function renderAccounts() {
      recordAccount.innerHTML = state.accounts.map(account => `<option value="${account.id}">${escapeHtml(account.name)}</option>`).join("");
      accountList.innerHTML = state.accounts.map(account => itemHtml(
        account.name,
        money.format(account.balance),
        "資產帳戶",
        account.color,
        deleteButton("account", account.id)
      )).join("") || emptyHtml("尚未建立資產帳戶");
    }

    function renderLiabilities() {
      liabilityList.innerHTML = state.liabilities.map(item => itemHtml(
        item.name,
        money.format(item.balance),
        "負債",
        item.color,
        deleteButton("liability", item.id)
      )).join("") || emptyHtml("尚未建立負債");
    }

    function renderInvestments() {
      investmentList.innerHTML = state.investments.map(item => {
        const value = item.shares * item.price;
        const updated = item.updatedAt ? formatTime(item.updatedAt) : "尚未更新";
        const sub = `${number.format(item.shares)} 股 · 當日價 ${number.format(item.price)} ${item.currency || "TWD"} · ${updated}`;
        return itemHtml(item.symbol, money.format(value), sub, "var(--yellow)", deleteButton("investment", item.id));
      }).join("") || emptyHtml("尚未建立投資標的");
    }

    function renderRecords() {
      recordList.innerHTML = state.records.slice().reverse().slice(0, 20).map(record => {
        const account = state.accounts.find(item => item.id === record.accountId);
        const sign = record.type === "income" ? "+" : "-";
        const color = record.type === "income" ? "var(--green)" : "var(--red)";
        const date = new Intl.DateTimeFormat("zh-TW", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }).format(new Date(record.createdAt));
        return itemHtml(record.name, `${sign}${money.format(record.amount)}`, `${account?.name || "帳戶"} · ${date}`, color, deleteButton("record", record.id));
      }).join("") || emptyHtml("尚未建立流水紀錄");
    }

    function addAccount(name, balance) {
      if (!name || !validAmount(balance, true)) return showToast("請填入資產名稱與餘額");
      state.accounts.push({ id: uid(), name, balance, color: pickColor(state.accounts.length) });
      showToast("已新增資產");
      render();
    }

    function addLiability(name, balance) {
      if (!name || !validAmount(balance, true)) return showToast("請填入負債名稱與金額");
      state.liabilities.push({ id: uid(), name, balance, color: "#ff8a7a" });
      showToast("已新增負債");
      render();
    }

    async function addInvestment(symbol, shares) {
      if (!symbol || !validAmount(shares)) {
        showToast("請填入代號與股數");
        return false;
      }
      addInvestmentButton.disabled = true;
      addInvestmentButton.textContent = "抓價中";
      priceStatus.textContent = "抓價中";
      try {
        const quote = await fetchMarketQuote(symbol);
        state.investments.push({
          id: uid(),
          symbol: quote.symbol,
          shares,
          price: quote.price,
          currency: quote.currency || "TWD",
          updatedAt: new Date().toISOString()
        });
        priceStatus.textContent = `已更新 ${quote.symbol}`;
        showToast("已抓到當日價並新增");
        render();
        return true;
      } catch (error) {
        showToast("抓不到價格，請確認代號");
        priceStatus.textContent = "抓價失敗";
        return false;
      } finally {
        addInvestmentButton.disabled = false;
        addInvestmentButton.textContent = "抓價並新增";
      }
    }

    function addRecord(accountId, type, name, amount) {
      const account = state.accounts.find(item => item.id === accountId);
      if (!account || !name || !validAmount(amount)) return showToast("請填入帳戶、項目與金額");
      account.balance += type === "income" ? amount : -amount;
      state.records.push({ id: uid(), accountId, type, name, amount, createdAt: new Date().toISOString() });
      showToast("已記一筆");
      render();
    }

    async function updatePrices() {
      if (!state.investments.length) return showToast("尚未建立投資標的");
      priceStatus.textContent = "更新中";
      refreshPrices.disabled = true;
      let success = 0;
      for (const item of state.investments) {
        try {
          const quote = await fetchMarketQuote(item.symbol);
          if (quote.price > 0) {
            item.symbol = quote.symbol;
            item.price = quote.price;
            item.currency = quote.currency || item.currency || "TWD";
            item.updatedAt = new Date().toISOString();
            success += 1;
          }
        } catch (error) {
          console.warn(error);
        }
      }
      refreshPrices.disabled = false;
      priceStatus.textContent = success ? `已更新 ${success} 檔` : "更新失敗";
      showToast(success ? "股價已更新" : "無法更新股價，請確認代號");
      render();
    }

    async function fetchMarketQuote(symbol) {
      const candidates = symbolCandidates(symbol);
      for (const candidate of candidates) {
        try {
          const quote = await fetchYahooQuote(candidate);
          if (quote.price > 0) return quote;
        } catch (error) {
          console.warn(error);
        }
      }
      throw new Error("quote failed");
    }

    async function fetchYahooQuote(symbol) {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=1d&interval=1m`;
      const response = await fetch(url);
      if (!response.ok) throw new Error("quote failed");
      const data = await response.json();
      const result = data.chart?.result?.[0];
      const meta = result?.meta || {};
      const price = Number(meta.regularMarketPrice || meta.previousClose || 0);
      return { symbol: meta.symbol || symbol, price, currency: meta.currency || "TWD" };
    }

    function symbolCandidates(symbol) {
      const clean = symbol.trim().toUpperCase();
      if (/^\d{4,6}$/.test(clean)) return [`${clean}.TW`, `${clean}.TWO`];
      return [clean];
    }

    function removeItem(kind, id) {
      if (kind === "account") state.accounts = state.accounts.filter(item => item.id !== id);
      if (kind === "liability") state.liabilities = state.liabilities.filter(item => item.id !== id);
      if (kind === "investment") state.investments = state.investments.filter(item => item.id !== id);
      if (kind === "record") state.records = state.records.filter(item => item.id !== id);
      showToast("已刪除");
      render();
    }

    function fillExample(type) {
      const examples = {
        account: () => { accountName.value = "活存"; accountBalance.value = "30000"; },
        liability: () => { liabilityName.value = "信用卡"; liabilityBalance.value = "6800"; },
        investment: () => { investmentSymbol.value = "0050"; investmentShares.value = "20"; },
        record: () => { recordName.value = "餐飲"; recordAmount.value = "120"; recordType.value = "expense"; }
      };
      examples[type]?.();
    }

    function itemHtml(title, value, sub, color, action) {
      return `<div class="item">
        <div class="item-main">
          <div class="item-title"><span class="dot" style="background:${color}"></span><span>${escapeHtml(title)}</span></div>
          <div class="item-sub">${escapeHtml(sub)}</div>
        </div>
        <div>
          <div class="item-value" style="color:${color}">${escapeHtml(value)}</div>
          ${action}
        </div>
      </div>`;
    }

    function deleteButton(kind, id) {
      return `<button class="danger" type="button" aria-label="刪除" onclick="removeItem('${kind}', '${id}')">×</button>`;
    }

    function emptyHtml(text) {
      return `<div class="item"><div class="item-main"><div class="item-title">${escapeHtml(text)}</div></div></div>`;
    }

    function percent(value, total) {
      return total ? Math.max(0, (value / total) * 100) : 0;
    }

    function sum(items, key) {
      return items.reduce((total, item) => total + Number(item[key] || 0), 0);
    }

    function toNumber(value) {
      return Number(value || 0);
    }

    function validAmount(value, allowZero = false) {
      return Number.isFinite(value) && (allowZero ? value >= 0 : value > 0);
    }

    function formatTime(value) {
      return new Intl.DateTimeFormat("zh-TW", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function pickColor(index) {
      return ["#2dd4bf", "#8bb9ff", "#8bdc96", "#f7c948"][index % 4];
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    window.removeItem = removeItem;
    render();
  </script>
</body>
</html>
