name: Update Taiwan stock prices

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1-5"

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/update-prices.mjs
      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --cached --quiet; then
            echo "No price changes"
          else
            git commit -m "Update Taiwan stock prices"
            git push
          fi
